name: zava-storefront
targets:
  - copilot
version: 0.1.0
description: >-
  Zava's customer-facing storefront. Next.js (App Router) + Postgres,
  deployed to Azure. Pins zava-agent-config for shared skills, instructions,
  personas, and the apm-audit CI gate.
author: Zava Engineering
license: UNLICENSED
keywords:
  - zava
  - storefront
  - nextjs
  - demo

dependencies:
  apm:
    # v5.0.1 marketplace — pin only the kits storefront actually needs.
    # ideate-kit (meeting-to-issue) lives upstream of this repo (PM tooling), so we
    # skip it. Every other kit applies: secure-baseline always, code-kit for PRs,
    # review-kit for the PR Review Panel workflow, release-kit for our CI/CD
    # pipelines, operate-kit for SRE Agent → remediation PRs.
    - DevExpGbb/zava-agent-config/plugins/secure-baseline#v5.0.1
    - DevExpGbb/zava-agent-config/plugins/code-kit#v5.0.1
    - DevExpGbb/zava-agent-config/plugins/review-kit#v5.0.1
    - DevExpGbb/zava-agent-config/plugins/release-kit#v5.0.1
    - DevExpGbb/zava-agent-config/plugins/operate-kit#v5.0.1
  mcp: []

includes: auto

compilation:
  source_attribution: true
