# Storefront repo-level APM policy override.
#
# Inherits DevExpGbb/.github/apm-policy.yml (org root) via `extends: org`.
# Per APM tighten-only merge rules, this file can ONLY narrow allow lists,
# add deny entries, escalate enforcement, and shorten depth limits — never
# relax a parent constraint.
# https://microsoft.github.io/apm/enterprise/policy-reference/#tighten-only-merge-rules
#
# Run locally: apm audit --ci --policy ./apm-policy.yml

name: storefront-team-policy
version: "1.1.0"
extends: org
enforcement: block
dependencies:
  deny:
    # Storefront security review requires explicit go-ahead on accelerators.
    # modernize-kit is allowed at the org layer but tightened off here until
    # the framework-modernizer migration plan ships. Repo overrides LAYER on
    # top of org policy: violations from either layer fail the same gate.
    - "**/modernize-kit"
  # WORKAROUND (apm-cli inheritance gap, same root cause as unmanaged_files):
  # `extends: org` also fails to layer `dependencies.require` from the parent.
  # We redeclare the security-baseline floor here so Beat 1 (drop pin) fires
  # the `required-packages` violation as expected.
  require:
    - "DevExpGbb/zava-agent-config/plugins/secure-baseline"

# WORKAROUND (apm-cli inheritance gap): `extends: org` does NOT layer
# `unmanaged_files` from the parent. Until that's fixed upstream, we
# redeclare the floor here so the storefront-team-policy enforces the
# same posture as the org root.
unmanaged_files:
  action: deny
  directories:
    - .github/agents
    - .github/instructions
    - .github/hooks
